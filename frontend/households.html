<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Households Management - Barangay Profiling System</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/households.css">
</head>
<body>

  <div class="app-container">
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        Barangay<span>Profile</span>
      </div>
      <ul class="sidebar-menu">
        <li class="sidebar-item"><a href="residents.html">Residents</a></li>
        <li class="sidebar-item"><a href="households.html">Households</a></li>
      </ul>
    </aside>

    <!-- Main Workspace -->
    <main class="main-content">
      <!-- Top Bar -->
      <header class="main-header">
        <div class="page-title">
          <h1>Households</h1>
        </div>
        <div class="user-profile">
          <span class="user-name">Administrator</span>
          <div class="avatar">A</div>
        </div>
      </header>

      <!-- Page Content -->
      <section class="content-body">
        <!-- Control Bar -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
          <h2 style="font-size: 1.1rem; font-weight: 600;">Registered Households</h2>
          <button class="btn btn-primary">+ Add Household</button>
        </div>

        <!-- Cards Grid Layout -->
        <div class="households-grid">
          <div style="grid-column: 1 / -1; text-align: center; color: var(--text-secondary); padding: 40px 0;">
            No households registered yet.
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script src="js/households.js"></script>
</body>
</html>
